name: "Chimera GitHub Action"
description: "Run Chimera in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the Chimera session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of OpenCode App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/chimera,/oc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.opencode.ai"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get Chimera version
      id: version
      shell: bash
      run: |
        VERSION=$(npm view chimera version 2>/dev/null || echo latest)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache Chimera npm packages
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: chimera-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install Chimera
      shell: bash
      run: npm install -g chimera

    - name: Run Chimera
      shell: bash
      id: run_chimera
      run: chimera github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
